<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadra Pharma ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#0284c7;--primary-d:#0369a1;--secondary:#7c3aed;
  --bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;
  --border:rgba(2,132,199,0.15);--hover:rgba(2,132,199,0.06);
  --sw:220px;--th:56px;--font:'Tajawal',sans-serif;
  --shadow:0 2px 12px rgba(2,132,199,0.08);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* ── Login ── */
#login-screen{
  position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#f8fafc,#f0f9ff 50%,#f5f3ff);
}
.login-box{
  background:#fff;border:1px solid var(--border);border-radius:24px;
  padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(2,132,199,0.1);
  position:relative;overflow:hidden;
}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#0284c7,#7c3aed)}
.login-logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0284c7,#7c3aed);
  display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;
  color:#fff;margin:0 auto 16px}
.login-title{font-size:20px;font-weight:800;color:#0f172a;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:24px}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.user-card{background:#f8fafc;border:1.5px solid var(--border);border-radius:12px;
  padding:14px 10px;cursor:pointer;transition:all .2s;text-align:center;position:relative}
.user-card:hover{border-color:rgba(2,132,199,0.4);background:#f0f9ff;transform:translateY(-2px)}
.user-card.locked{opacity:.5;cursor:not-allowed}
.u-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;margin:0 auto 8px}
.u-name{font-size:12px;font-weight:700;color:#0f172a;margin-bottom:2px}
.u-role{font-size:10px;color:#64748b}
.u-badge{position:absolute;top:6px;left:6px;font-size:9px;padding:2px 5px;border-radius:4px;font-weight:600}
.badge-admin{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.badge-role{background:#e0f2fe;color:#0369a1;border:1px solid #7dd3fc}
.sel-user{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:#f0f9ff;border:1px solid var(--border);border-radius:10px;margin-bottom:16px}
.sel-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.pw-field{margin-bottom:12px}
.pw-label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.5px}
.pw-wrap{position:relative}
.pw-inp{width:100%;padding:10px 40px 10px 12px;background:#f8fafc;border:1.5px solid var(--border);
  border-radius:8px;font-family:var(--font);font-size:13px;color:#0f172a;outline:none;transition:all .2s}
.pw-inp:focus{border-color:#0284c7;background:#fff;box-shadow:0 0 0 3px rgba(2,132,199,0.1)}
.pw-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;color:#94a3b8}
.pw-eye{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;cursor:pointer;color:#94a3b8}
.err{background:#fee2e2;border:1px solid #fca5a5;border-radius:7px;padding:8px 11px;
  font-size:12px;color:#991b1b;margin-bottom:10px;display:none}
.err.show{display:block}
.att-bar{height:3px;background:rgba(220,38,38,0.1);border-radius:2px;margin-bottom:10px;overflow:hidden;display:none}
.att-fill{height:100%;background:#ef4444;border-radius:2px;width:0%;transition:width .3s}
.login-btn{width:100%;padding:11px;background:linear-gradient(135deg,#0284c7,#0369a1);color:#fff;
  border:none;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(2,132,199,0.3)}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(2,132,199,0.4)}
.login-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.back-btn{background:none;border:none;color:#64748b;font-family:var(--font);font-size:12px;
  cursor:pointer;padding:0;margin-bottom:14px;transition:color .15s}
.back-btn:hover{color:#0284c7}
.forgot-btn{width:100%;padding:8px;margin-top:8px;background:transparent;
  border:1px solid rgba(2,132,199,0.15);border-radius:8px;color:#64748b;
  font-family:var(--font);font-size:12px;cursor:pointer;transition:all .2s}
.forgot-btn:hover{color:#0284c7;border-color:rgba(2,132,199,0.3)}
.step-dots{display:flex;gap:5px;justify-content:center;margin-bottom:18px}
.dot{width:6px;height:6px;border-radius:3px;background:rgba(2,132,199,0.2);transition:all .25s}
.dot.a{width:20px;background:#0284c7}.dot.d{background:#0284c7}
.view{display:none}.view.act{display:block}
.caps-warn{font-size:11px;color:#d97706;margin-top:4px;display:none}

/* ── App Shell ── */
#app{display:none;width:100%}
.sidebar{
  width:var(--sw);position:fixed;right:0;top:0;height:100vh;z-index:100;
  background:#fff;border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:2px 0 12px rgba(2,132,199,0.06);
}
.sb-logo{display:flex;align-items:center;gap:9px;padding:14px;border-bottom:1px solid var(--border)}
.sb-gem{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#0284c7,#7c3aed);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
.sb-name{font-size:13px;font-weight:700;color:#0f172a}
.sb-co{font-size:11px;color:#64748b}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.nsec{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(2,132,199,0.4);padding:12px 14px 4px}
.nitem{display:flex;align-items:center;gap:8px;padding:7px 12px;margin:1px 7px;
  border-radius:7px;cursor:pointer;color:#64748b;font-size:12px;transition:all .15s}
.nitem:hover{background:var(--hover);color:#0284c7}
.nitem.act{background:rgba(2,132,199,0.1);color:#0369a1;font-weight:600}
.nitem.act::before{content:'';position:absolute;right:-7px;top:50%;transform:translateY(-50%);
  width:3px;height:18px;border-radius:2px;background:linear-gradient(180deg,#0284c7,#7c3aed)}
.nitem{position:relative}
.nic{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-foot{display:flex;align-items:center;gap:8px;padding:10px 14px;
  border-top:1px solid var(--border);background:#f8fafc}
.sb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#0284c7,#7c3aed);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sb-un{font-size:12px;font-weight:600;color:#0f172a}
.sb-ur{font-size:10px;color:#64748b}
.sb-logout{margin-right:auto;background:none;border:none;cursor:pointer;color:#94a3b8;
  font-size:14px;padding:2px 5px;border-radius:5px;transition:all .15s}
.sb-logout:hover{color:#dc2626;background:#fee2e2}
.topbar{
  position:fixed;top:0;right:var(--sw);left:0;height:var(--th);
  display:flex;align-items:center;padding:0 16px;gap:8px;flex-wrap:nowrap;
  background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  box-shadow:0 1px 8px rgba(2,132,199,0.06);z-index:99;overflow:hidden;
}
.pg-title-text{font-size:14px;font-weight:600;color:#0f172a;white-space:nowrap}
.tb-spacer{flex:1}
.tb-search{flex:1;max-width:280px}
.tb-search input{width:100%;padding:6px 11px;background:#f1f5f9;border:1px solid var(--border);
  border-radius:7px;font-family:var(--font);font-size:12px;color:#0f172a;outline:none}
.tb-search input:focus{border-color:#0284c7;background:#fff}
.tb-btn{padding:5px 9px;border:1px solid var(--border);border-radius:7px;background:#f8fafc;
  color:#64748b;cursor:pointer;font-size:13px;transition:all .15s;white-space:nowrap}
.tb-btn:hover{background:#f0f9ff;color:#0284c7;border-color:rgba(2,132,199,0.3)}
.main-area{
  margin-right:var(--sw);margin-top:var(--th);
  padding:calc(1cm + 16px) 20px 20px;
  min-height:calc(100vh - var(--th));
  box-sizing:border-box;flex:1;
}
.module-frame{width:100%;border:none;min-height:600px;display:block}

/* ── Central Dashboard ── */
#central-dash{
  position:fixed;inset:0;z-index:50;overflow-y:auto;display:none;
  background:linear-gradient(145deg,#f8fafc,#f0f9ff 50%,#f5f3ff);
  font-family:var(--font);
}
.cd-top{position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:0 22px;height:54px;
  display:flex;align-items:center;gap:12px;z-index:10}
.cd-gem{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#0284c7,#7c3aed);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
.cd-name{font-size:14px;font-weight:800;background:linear-gradient(135deg,#0284c7,#7c3aed);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cd-sp{flex:1}
.cd-user{display:flex;align-items:center;gap:8px}
.cd-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#0284c7,#7c3aed);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.cd-nm{font-size:12px;font-weight:700;color:#0f172a}
.cd-rl{font-size:10px;color:#64748b}
.logout-btn{padding:5px 10px;border:1px solid var(--border);border-radius:7px;background:#f8fafc;
  color:#64748b;font-family:var(--font);font-size:12px;cursor:pointer;transition:all .2s}
.logout-btn:hover{background:#f0f9ff;color:#0284c7}
.cd-body{padding:24px 22px;max-width:1000px;margin:0 auto}
.cd-greet{font-size:20px;font-weight:800;color:#0f172a;margin-bottom:3px}
.cd-sub{font-size:13px;color:#64748b;margin-bottom:20px}
.cd-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.cd-stat{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.cd-sv{font-size:24px;font-weight:700;line-height:1;margin-bottom:3px}
.cd-sl{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.7px}
.cd-sec{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;
  margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cd-sec::after{content:'';flex:1;height:1px;background:rgba(2,132,199,0.1)}
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:24px}
.co-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.co-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(2,132,199,0.1);border-color:rgba(2,132,199,0.3)}
.co-gem{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;color:#fff;margin-bottom:10px;box-shadow:0 3px 10px rgba(0,0,0,0.12)}
.co-nm{font-size:14px;font-weight:700;color:#0f172a;margin-bottom:2px}
.co-tp{font-size:11px;color:#64748b;margin-bottom:10px}
.co-stats{display:flex;gap:12px}
.co-s{font-size:10px;color:#94a3b8}
.co-s strong{display:block;font-size:14px;font-weight:700;color:#0284c7;line-height:1}
.co-arr{position:absolute;bottom:12px;left:12px;width:24px;height:24px;border-radius:50%;
  background:rgba(2,132,199,0.1);border:1px solid rgba(2,132,199,0.2);
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#0284c7;transition:all .2s}
.co-card:hover .co-arr{background:#0284c7;color:#fff}
.co-add{border:1.5px dashed rgba(2,132,199,0.2);background:rgba(248,250,252,.6);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:7px;min-height:130px;color:#94a3b8}
.co-add:hover{border-color:rgba(2,132,199,0.4);background:#f0f9ff;color:#0284c7}
.co-add-icon{font-size:22px}
.co-add-lbl{font-size:12px;font-weight:600}

/* ── Mobile ── */
#mob-btn{display:none;width:34px;height:34px;border-radius:7px;background:#f0f9ff;
  border:1px solid var(--border);cursor:pointer;align-items:center;justify-content:center;
  font-size:16px;color:#0284c7}
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;backdrop-filter:blur(2px)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:rgba(2,132,199,0.25);border-radius:2px}
@media(max-width:768px){
  .sidebar{transform:translateX(110%);transition:.25s}
  .sidebar.open{transform:translateX(0)}
  #sb-overlay.open{display:block}
  #mob-btn{display:flex}
  .topbar{right:0}
  .main-area{margin-right:0;padding:calc(1cm + 12px) 12px 12px}
  .cd-stats{grid-template-columns:1fr 1fr}
  .co-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .cd-stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Q</div>
    <div class="login-title">Quadra Pharma ERP</div>
    <div class="login-sub">نظام الإدارة الصيدلاني المصري</div>
    <div class="step-dots" id="dots">
      <div class="dot a" id="d0"></div>
      <div class="dot" id="d1"></div>
    </div>
    <!-- Step 1: Pick user -->
    <div class="view act" id="v-pick">
      <div class="user-grid" id="user-grid"></div>
      <div style="font-size:11px;color:#94a3b8;text-align:center">كلمة المرور في الخطوة التالية</div>
    </div>
    <!-- Step 2: Password -->
    <div class="view" id="v-pass">
      <button class="back-btn" onclick="goStep(0)">← تغيير المستخدم</button>
      <div class="sel-user"><div class="sel-av" id="sel-av">A</div>
        <div><div id="sel-name" style="font-size:14px;font-weight:700;color:#0f172a"></div>
          <div id="sel-role" style="font-size:11px;color:#64748b;margin-top:2px"></div></div>
      </div>
      <div class="err" id="pw-err"></div>
      <div class="att-bar" id="att-bar"><div class="att-fill" id="att-fill"></div></div>
      <div class="pw-field">
        <label class="pw-label" for="pw-inp">كلمة المرور</label>
        <div class="pw-wrap">
          <span class="pw-icon">🔒</span>
          <input type="password" class="pw-inp" id="pw-inp" dir="ltr" placeholder="••••••••"
            onkeydown="if(event.key==='Enter')doLogin()"
            onkeyup="document.getElementById('caps-w').style.display=event.getModifierState('CapsLock')?'block':'none'"
            oninput="document.getElementById('pw-err').classList.remove('show')">
          <span class="pw-eye" id="eye" onclick="toggleEye()">👁</span>
        </div>
        <div class="caps-warn" id="caps-w">⚠️ Caps Lock مفعّل</div>
      </div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">دخول ←</button>
      <button class="forgot-btn" onclick="alert('تواصل مع مدير النظام لإعادة تعيين كلمة المرور')">نسيت كلمة المرور؟</button>
    </div>
  </div>
</div>

<!-- ══ CENTRAL DASHBOARD ══ -->
<div id="central-dash">
  <div class="cd-top">
    <div class="cd-gem">Q</div>
    <div class="cd-name">Quadra Pharma ERP</div>
    <div class="cd-sp"></div>
    <div class="cd-user">
      <div><div class="cd-nm" id="cd-nm">—</div><div class="cd-rl" id="cd-rl">—</div></div>
      <div class="cd-av" id="cd-av">A</div>
      <button class="logout-btn" onclick="doLogout()">⏻ خروج</button>
    </div>
  </div>
  <div class="cd-body">
    <div class="cd-greet" id="cd-greet">مرحباً</div>
    <div class="cd-sub">اختر شركة للعمل عليها</div>
    <div class="cd-stats">
      <div class="cd-stat"><div class="cd-sv" id="stat-cos" style="color:#0284c7">0</div><div class="cd-sl">شركات</div></div>
      <div class="cd-stat"><div class="cd-sv" id="stat-prd" style="color:#059669">0</div><div class="cd-sl">منتجات</div></div>
      <div class="cd-stat"><div class="cd-sv" id="stat-reg" style="color:#d97706">0</div><div class="cd-sl">تسجيلات</div></div>
      <div class="cd-stat"><div class="cd-sv" id="stat-ord" style="color:#7c3aed">0</div><div class="cd-sl">أوامر</div></div>
    </div>
    <div class="cd-sec">شركاتي</div>
    <div class="co-grid" id="co-grid-el"></div>
  </div>
</div>

<!-- ══ APP SHELL ══ -->
<div id="app">
  <div id="sb-overlay" onclick="closeSb()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-gem">Q</div>
      <div><div class="sb-name">Quadra ERP</div><div class="sb-co" id="sb-co-name">—</div></div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-foot">
      <div class="sb-av" id="sb-av">A</div>
      <div><div class="sb-un" id="sb-un">—</div><div class="sb-ur" id="sb-ur">—</div></div>
      <button class="sb-logout" onclick="doLogout()" title="تسجيل خروج">⏻</button>
    </div>
  </aside>
  <div class="topbar">
    <button id="mob-btn" onclick="toggleSb()">☰</button>
    <span class="pg-title-text" id="pg-title">لوحة التحكم</span>
    <div class="tb-spacer"></div>
    <div class="tb-search"><input type="text" placeholder="🔍 بحث..."></div>
    <button class="tb-btn" onclick="showCentral()" title="تبديل الشركة">🏢</button>
    <button class="tb-btn" id="notif-btn">🔔</button>
  </div>
  <main class="main-area">
    <div id="module-area" style="width:100%;min-height:600px"></div>
  </main>
</div>

<script>
// ══════════════════════════════════════════════════
// DATA HELPERS
// ══════════════════════════════════════════════════
var STORE = 'qerp_v1';
function getData(){ try{return JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){return{}} }
function setData(d){ localStorage.setItem(STORE, JSON.stringify(d)) }
function getCompanies(){ return getData().companies||[] }
function setCompanies(c){ var d=getData(); d.companies=c; setData(d) }
function getCoData(id){ try{return JSON.parse(localStorage.getItem('qerp_co_'+id)||'{}')}catch(e){return{}} }
function setCoData(id,d){ localStorage.setItem('qerp_co_'+id, JSON.stringify(d)) }
function hash(s){ var h=0; for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0} return String(h) }

// ══════════════════════════════════════════════════
// AUTH STATE
// ══════════════════════════════════════════════════
var _user = null;
var _co   = null;
var _picked = null;
var _attempts = 0;
var MAX_ATT = 5;

var ROLE_LABELS = {admin:'مدير النظام',finance:'مدير مالي',production:'مدير إنتاج',
  ra:'مسؤول تسجيل',sales:'مبيعات',viewer:'عارض',quality:'جودة'};
var ROLE_ICONS  = {admin:'👑',finance:'💰',production:'🏭',ra:'📋',sales:'📊',viewer:'👁',quality:'🔬'};
var COLORS = ['#0e7490','#7c3aed','#059669','#d97706','#dc2626','#2563eb','#0f766e','#9333ea'];

// ══════════════════════════════════════════════════
// LOGIN — STEP 1: USER PICKER
// ══════════════════════════════════════════════════
function renderUserGrid(){
  var users = [];
  getCompanies().forEach(function(c){
    (getCoData(c.id).users||[]).forEach(function(u){
      if(!users.find(function(x){return x.username===u.username}))
        users.push(Object.assign({},u,{_cid:c.id}));
    });
  });
  if(!users.length) users=[{id:'default',username:'admin',name:'مدير النظام',role:'admin',active:true,_isDefault:true}];

  var g = document.getElementById('user-grid');
  g.innerHTML = '';
  users.forEach(function(u,i){
    var ini = (u.name||'?').split(' ').map(function(w){return w[0]||''}).join('').slice(0,2).toUpperCase();
    var col = COLORS[i%COLORS.length];
    var isAdmin = u.role==='admin', isLocked = u.active===false;
    var card = document.createElement('div');
    card.className = 'user-card'+(isLocked?' locked':'');
    card.innerHTML =
      '<div class="u-badge '+(isAdmin?'badge-admin':'badge-role')+'">'+(isAdmin?'👑 Admin':ROLE_ICONS[u.role]||'👤')+' '+(ROLE_LABELS[u.role]||u.role||'')+'</div>'+
      '<div class="u-av" style="background:'+col+'">'+ini+'</div>'+
      '<div class="u-name">'+esc(u.name||u.username)+'</div>'+
      '<div class="u-role">'+esc(ROLE_LABELS[u.role]||u.role||'')+'</div>';
    if(!isLocked)(function(usr,c,ini){
      card.onclick=function(){pickUser(usr,c,ini)};
    })(u,col,ini);
    g.appendChild(card);
  });
}

function pickUser(u, color, ini){
  _picked=u; _attempts=0;
  document.getElementById('sel-av').textContent=ini;
  document.getElementById('sel-av').style.background=color;
  document.getElementById('sel-name').textContent=u.name||u.username;
  document.getElementById('sel-role').textContent=(u.username||'')+(u.role?' · '+(ROLE_LABELS[u.role]||u.role):'');
  var pw=document.getElementById('pw-inp'); if(pw){pw.value='';pw.type='password';}
  document.getElementById('pw-err').classList.remove('show');
  document.getElementById('att-bar').style.display='none';
  document.getElementById('att-fill').style.width='0%';
  document.getElementById('login-btn').disabled=false;
  document.getElementById('eye').textContent='👁';
  goStep(1);
  setTimeout(function(){document.getElementById('pw-inp').focus()},150);
}

// ══════════════════════════════════════════════════
// LOGIN — STEP 2: PASSWORD
// ══════════════════════════════════════════════════
function doLogin(){
  if(!_picked) return;
  var pw = document.getElementById('pw-inp').value||'';
  var err = document.getElementById('pw-err');
  err.classList.remove('show');
  if(!pw){err.textContent='أدخل كلمة المرور';err.classList.add('show');return;}

  _attempts++;
  var bar = document.getElementById('att-bar');
  var fill = document.getElementById('att-fill');
  if(_attempts>=2) bar.style.display='block';
  fill.style.width = Math.min(100,_attempts/MAX_ATT*100)+'%';

  if(_attempts>=MAX_ATT){
    err.textContent='تم قفل الحساب — تواصل مع المدير';err.classList.add('show');
    document.getElementById('login-btn').disabled=true; return;
  }

  var u=_picked, ok=false;
  if(u._isDefault){ ok=(u.username==='admin'&&pw==='admin123'); }
  else { ok=(u.password===hash(pw)||u.password===pw); }

  if(ok){
    _user={username:u.username,name:u.name,role:u.role};
    try{sessionStorage.setItem('_s',JSON.stringify(_user))}catch(e){}
    if(u._isDefault) seedDefaultCompany();
    document.getElementById('login-screen').style.display='none';
    showCentral();
  } else {
    var rem=MAX_ATT-_attempts;
    err.textContent='كلمة المرور غير صحيحة'+(rem<=2?' — '+rem+' محاولة':'')+';';
    err.classList.add('show');
    var p=document.getElementById('pw-inp'); if(p){p.value='';p.focus();}
  }
}

function goStep(n){
  ['v-pick','v-pass'].forEach(function(v,i){
    document.getElementById(v).className='view'+(i===n?' act':'');
  });
  ['d0','d1'].forEach(function(d,i){
    document.getElementById(d).className='dot'+(i<n?' d':i===n?' a':'');
  });
  if(n===0) renderUserGrid();
}

function toggleEye(){
  var i=document.getElementById('pw-inp'),e=document.getElementById('eye');
  if(!i)return; i.type=i.type==='password'?'text':'password'; e.textContent=i.type==='password'?'👁':'🙈'; i.focus();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// ══════════════════════════════════════════════════
// SEED DEFAULT COMPANY
// ══════════════════════════════════════════════════
function seedDefaultCompany(){
  if(getCompanies().length) return;
  var id='co_'+Date.now();
  setCompanies([{id:id,name:'Quadra Pharm',type:'شركة دوائية',color:'0e7490'}]);
  setCoData(id,{users:[{id:1,username:'admin',name:'مدير النظام',role:'admin',password:hash('admin123'),active:true}],products:[],registrations:[],orders:[]});
}

// ══════════════════════════════════════════════════
// CENTRAL DASHBOARD
// ══════════════════════════════════════════════════
function showCentral(){
  document.getElementById('central-dash').style.display='block';
  document.getElementById('app').style.display='none';
  if(!_user) return;
  var r=ROLE_LABELS[_user.role]||_user.role||'';
  document.getElementById('cd-nm').textContent=_user.name||_user.username;
  document.getElementById('cd-rl').textContent=(ROLE_ICONS[_user.role]||'👤')+' '+r;
  document.getElementById('cd-av').textContent=(_user.name||'?')[0].toUpperCase();
  document.getElementById('cd-greet').textContent='مرحباً، '+(_user.name||_user.username)+' 👋';
  renderCoGrid();
}

function renderCoGrid(){
  var cos=getCompanies();
  var tp=0,tr=0,to=0;
  cos.forEach(function(c){
    var d=getCoData(c.id);
    tp+=(d.products||[]).length;
    tr+=(d.registrations||[]).length;
    to+=(d.orders||[]).length;
  });
  document.getElementById('stat-cos').textContent=cos.length;
  document.getElementById('stat-prd').textContent=tp;
  document.getElementById('stat-reg').textContent=tr;
  document.getElementById('stat-ord').textContent=to;

  var g=document.getElementById('co-grid-el'); g.innerHTML='';
  cos.forEach(function(c){
    var d=getCoData(c.id);
    var col='#'+(c.color||'0e7490');
    var card=document.createElement('div'); card.className='co-card';
    card.innerHTML=
      '<div class="co-gem" style="background:'+col+'">'+(c.name||'?')[0]+'</div>'+
      '<div class="co-nm">'+esc(c.name)+'</div>'+
      '<div class="co-tp">'+esc(c.type||'')+'</div>'+
      '<div class="co-stats">'+
        '<div class="co-s"><strong>'+(d.products||[]).length+'</strong>منتج</div>'+
        '<div class="co-s"><strong>'+(d.registrations||[]).length+'</strong>تسجيل</div>'+
      '</div>'+
      '<div class="co-arr">←</div>';
    (function(co){card.onclick=function(){enterCo(co)}})(c);
    g.appendChild(card);
  });
  var add=document.createElement('div'); add.className='co-card co-add';
  add.innerHTML='<div class="co-add-icon">➕</div><div class="co-add-lbl">شركة جديدة</div>';
  add.onclick=addCompany; g.appendChild(add);
}

function enterCo(co){
  _co=co;
  document.getElementById('central-dash').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('sb-co-name').textContent=co.name||'';
  document.getElementById('sb-un').textContent=_user.name||_user.username;
  document.getElementById('sb-ur').textContent=ROLE_LABELS[_user.role]||_user.role||'';
  document.getElementById('sb-av').textContent=(_user.name||'?')[0].toUpperCase();
  buildNav();
  loadPage('dashboard');
}

function addCompany(){
  var name=(prompt('اسم الشركة الجديدة:','')||'').trim(); if(!name)return;
  var type=prompt('نوع النشاط:','شركة دوائية')||'شركة دوائية';
  var colors=['0e7490','7c3aed','059669','d97706','dc2626','2563eb','0f766e','9333ea'];
  var id='co_'+Date.now();
  var cos=getCompanies(); cos.push({id:id,name:name,type:type,color:colors[cos.length%colors.length]});
  setCompanies(cos);
  setCoData(id,{users:[{id:1,username:'admin',name:'مدير النظام',role:'admin',password:hash('admin123'),active:true}],products:[],registrations:[],orders:[]});
  renderCoGrid();
}

// ══════════════════════════════════════════════════
// NAV + PAGES
// ══════════════════════════════════════════════════
var PAGES = [
  {sec:'الرئيسية'},
  {id:'dashboard',  icon:'📊', label:'لوحة التحكم', mod:'modules/dashboard.html'},
  {sec:'التسجيل والمنتجات'},
  {id:'registration',icon:'📋',label:'تسجيل EDA / NFSA',mod:'modules/registration.html'},
  {id:'products',   icon:'💊', label:'المنتجات',       mod:'modules/products.html'},
  {id:'materials',  icon:'🧪', label:'المواد الخام',   mod:'modules/materials.html'},
  {sec:'الإنتاج'},
  {id:'production', icon:'🏭', label:'أوامر الإنتاج',  mod:'modules/production.html'},
  {id:'quality',    icon:'🔬', label:'الجودة GMP',     mod:'modules/quality.html'},
  {id:'bom',        icon:'📐', label:'وصفات الإنتاج',  mod:'modules/bom.html'},
  {sec:'المالية'},
  {id:'finance',    icon:'💰', label:'المالية',         mod:'modules/finance.html'},
  {id:'expenses',   icon:'💳', label:'المصروفات',       mod:'modules/expenses.html'},
  {id:'payroll',    icon:'👥', label:'الرواتب',         mod:'modules/payroll.html'},
  {sec:'المخزون والتوزيع'},
  {id:'inventory',  icon:'📦', label:'المخزون',         mod:'modules/inventory.html'},
  {id:'deliveries', icon:'🚚', label:'أوامر التوريد',   mod:'modules/deliveries.html'},
  {sec:'الإعدادات'},
  {id:'company',    icon:'🏢', label:'بيانات الشركة',   mod:'modules/company.html'},
  {id:'users',      icon:'👤', label:'المستخدمون',      mod:'modules/users.html'},
];

function buildNav(){
  var nav=document.getElementById('sb-nav'); nav.innerHTML='';
  PAGES.forEach(function(p){
    if(p.sec){
      var d=document.createElement('div'); d.className='nsec'; d.textContent=p.sec;
      nav.appendChild(d);
    } else {
      var a=document.createElement('div'); a.className='nitem'; a.id='nav-'+p.id;
      a.innerHTML='<span class="nic">'+p.icon+'</span><span>'+p.label+'</span>';
      (function(pg){a.onclick=function(){loadPage(pg.id)}})(p);
      nav.appendChild(a);
    }
  });
}

var _curPage = null;

function loadPage(id){
  var p=PAGES.find(function(x){return x.id===id});
  if(!p||!p.mod) return;
  _curPage=id;
  document.querySelectorAll('.nitem').forEach(function(x){x.classList.remove('act')});
  var ni=document.getElementById('nav-'+id); if(ni) ni.classList.add('act');
  document.getElementById('pg-title').textContent=p.label||'';
  var area=document.getElementById('module-area');
  area.innerHTML='<div style="text-align:center;padding:40px;color:#64748b"><div style="font-size:24px;margin-bottom:8px">⏳</div>جاري التحميل...</div>';

  // Pass context via URL params
  var url=p.mod+'?co='+encodeURIComponent(_co?_co.id:'')+'&user='+encodeURIComponent(JSON.stringify(_user||{}))+'&t='+Date.now();

  fetch(url)
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.text();
    })
    .then(function(html){
      // Extract <body> content and <style>/<script> tags
      var parser=new DOMParser();
      var doc=parser.parseFromString(html,'text/html');

      // Clear area
      area.innerHTML='';

      // Inject styles
      doc.querySelectorAll('style').forEach(function(s){
        var el=document.createElement('style');
        el.textContent=s.textContent;
        area.appendChild(el);
      });

      // Inject body content
      var wrapper=document.createElement('div');
      wrapper.id='mod-content-'+id;
      wrapper.innerHTML=doc.body.innerHTML;

      // Remove script tags from innerHTML (they don't execute)
      wrapper.querySelectorAll('script').forEach(function(s){s.remove()});
      area.appendChild(wrapper);

      // Re-execute scripts
      doc.querySelectorAll('script').forEach(function(s){
        var el=document.createElement('script');
        el.textContent=s.textContent;
        // Override params to use current context
        var ctx='var params=new URLSearchParams("co="+encodeURIComponent("'+(_co?_co.id:'')+'")+"&user="+encodeURIComponent(''+JSON.stringify(_user||{}).replace(/'/g,"\'")+''));';
        el.textContent=ctx+s.textContent;
        area.appendChild(el);
      });
    })
    .catch(function(err){
      area.innerHTML='<div style="text-align:center;padding:40px;color:#dc2626"><div style="font-size:24px;margin-bottom:8px">⚠️</div>خطأ في تحميل الصفحة<br><small style="color:#94a3b8">'+err.message+'</small></div>';
    });

  if(window.innerWidth<=768) closeSb();
}

// ══════════════════════════════════════════════════
// MOBILE SIDEBAR
// ══════════════════════════════════════════════════
function toggleSb(){
  var sb=document.getElementById('sidebar');
  var ov=document.getElementById('sb-overlay');
  var open=sb.classList.toggle('open');
  ov.classList.toggle('open',open);
  document.body.style.overflow=open?'hidden':'';
}
function closeSb(){
  var sb=document.getElementById('sidebar');
  var ov=document.getElementById('sb-overlay');
  sb.classList.remove('open'); ov.classList.remove('open');
  document.body.style.overflow='';
}
window.addEventListener('resize',function(){if(window.innerWidth>768)closeSb()});

// ══════════════════════════════════════════════════
// LOGOUT
// ══════════════════════════════════════════════════
function doLogout(){
  _user=null; _co=null; _picked=null;
  try{sessionStorage.removeItem('_s')}catch(e){}
  document.getElementById('central-dash').style.display='none';
  document.getElementById('app').style.display='none';
  document.getElementById('module-area').innerHTML='';
  goStep(0);
  document.getElementById('login-screen').style.display='flex';
}

// ══════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════
(function boot(){
  var sess=null;
  try{sess=JSON.parse(sessionStorage.getItem('_s')||'null')}catch(e){}
  if(sess&&sess.username){
    _user=sess;
    document.getElementById('login-screen').style.display='none';
    showCentral();
  } else {
    renderUserGrid();
  }
})();
</script>
