<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharma ERP — المرحلة 1</title>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fa;--surface:#fff;--border:#e2e8f0;--border2:#cbd5e1;
  --primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#eff6ff;
  --success:#16a34a;--success-light:#f0fdf4;
  --danger:#dc2626;--danger-light:#fef2f2;
  --warning:#d97706;--warning-light:#fffbeb;
  --text:#1e293b;--text2:#64748b;--text3:#94a3b8;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow2:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --radius:8px;--radius2:12px;
}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
/* ===== LAYOUT ===== */
#app{display:flex;min-height:100vh}
#sidebar{width:240px;background:#1e293b;color:#cbd5e1;display:flex;flex-direction:column;flex-shrink:0;transition:width .3s}
#sidebar.collapsed{width:60px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
#content{flex:1;overflow-y:auto;padding:24px}
/* ===== SIDEBAR ===== */
.sb-logo{padding:16px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:16px;flex-shrink:0}
.sb-logo-text{font-weight:600;color:#f1f5f9;font-size:15px;white-space:nowrap;overflow:hidden}
.sb-company{padding:12px 16px;border-bottom:1px solid #334155;font-size:12px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:.15s;border-radius:0;color:#94a3b8;text-decoration:none;white-space:nowrap}
.sb-item:hover{background:#334155;color:#f1f5f9}
.sb-item.active{background:#2563eb;color:#fff}
.sb-item svg{flex-shrink:0;width:18px;height:18px}
.sb-item span{overflow:hidden;text-overflow:ellipsis}
.sb-section{padding:4px 16px 2px;font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:.05em;margin-top:8px}
/* ===== TOPBAR ===== */
.topbar-title{font-weight:600;font-size:16px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-right{display:flex;align-items:center;gap:8px}
.user-badge{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg);border-radius:20px;cursor:pointer;font-size:13px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:1px solid transparent;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;white-space:nowrap;text-decoration:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover:not(:disabled){background:var(--primary-dark)}
.btn-outline{background:#fff;color:var(--text);border-color:var(--border2)}
.btn-outline:hover{background:var(--bg)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:7px;border-radius:var(--radius)}
/* ===== CARDS ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);box-shadow:var(--shadow)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-title{font-weight:600;font-size:15px}
.card-body{padding:20px}
/* ===== FORMS ===== */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text)}
.form-label .req{color:var(--danger)}
.form-control{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:#fff;color:var(--text);transition:.15s;direction:inherit}
.form-control:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-control.error{border-color:var(--danger)}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px}
.form-error{font-size:11px;color:var(--danger);margin-top:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
/* ===== TABLE ===== */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:right;padding:10px 14px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);background:var(--bg);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:var(--success-light);color:var(--success)}
.badge-red{background:var(--danger-light);color:var(--danger)}
.badge-blue{background:var(--primary-light);color:var(--primary)}
.badge-gray{background:#f1f5f9;color:var(--text2)}
/* ===== ALERTS ===== */
.alert{padding:12px 16px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px}
.alert-success{background:var(--success-light);color:#15803d;border:1px solid #bbf7d0}
.alert-danger{background:var(--danger-light);color:#b91c1c;border:1px solid #fecaca}
.alert-info{background:var(--primary-light);color:#1d4ed8;border:1px solid #bfdbfe}
/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:var(--radius2);width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:600;font-size:15px}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* ===== STATS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:16px 20px}
.stat-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.stat-value{font-size:28px;font-weight:700;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
/* ===== LOGIN ===== */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e293b 0%,#1e40af 100%)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-icon{width:56px;height:56px;background:var(--primary);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;margin-bottom:12px}
.login-logo h1{font-size:20px;font-weight:700;color:var(--text)}
.login-logo p{font-size:13px;color:var(--text2);margin-top:4px}
/* ===== SEARCH BAR ===== */
.search-bar{position:relative;flex:1;max-width:320px}
.search-bar input{padding:8px 12px 8px 36px;border:1px solid var(--border2);border-radius:20px;font-size:13px;width:100%;background:#f8f9fa;direction:rtl}
.search-bar input:focus{outline:none;border-color:var(--primary);background:#fff}
.search-bar svg{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--text3)}
/* ===== TABS ===== */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab-btn{padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
/* ===== FILE UPLOAD ===== */
.file-drop{border:2px dashed var(--border2);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:.15s;color:var(--text2)}
.file-drop:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.file-list{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg);border-radius:var(--radius);font-size:12px}
/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  #sidebar{position:fixed;z-index:200;height:100vh;transform:translateX(100%);transition:.3s}
  #sidebar.open{transform:translateX(0)}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  #content{padding:16px}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr}
  .modal{margin:0;border-radius:16px 16px 0 0;max-height:95vh}
  .modal-overlay{align-items:flex-end;padding:0}
}
/* ===== MISC ===== */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:700}
.page-sub{font-size:13px;color:var(--text2)}
.divider{height:1px;background:var(--border);margin:20px 0}
.text-center{text-align:center}
.text-muted{color:var(--text2)}
.text-sm{font-size:12px}
.mt-1{margin-top:6px}.mt-2{margin-top:12px}.mt-3{margin-top:20px}
.gap-2{gap:8px}
.hidden{display:none!important}
.flex{display:flex}.items-center{align-items:center}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:48px 20px;color:var(--text2)}
.empty-state svg{margin:0 auto 12px;opacity:.4}
.empty-state h3{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text)}
.empty-state p{font-size:13px}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">P</div>
      <h1>Pharma ERP</h1>
      <p>نظام إدارة المصنع الدوائي</p>
    </div>
    <div id="login-alert"></div>
    <div class="form-group">
      <label class="form-label">كود الشركة <span class="req">*</span></label>
      <input class="form-control" id="inp-code" placeholder="مثال: QUAD" style="text-transform:uppercase">
    </div>

      <p class="text-sm text-muted">أول مرة؟</p>
      <button class="btn btn-outline btn-sm" style="margin-top:6px;width:100%;justify-content:center" onclick="showRegisterModal()">إنشاء شركة جديدة</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">P</div>
      <div class="sb-logo-text">Pharma ERP</div>
    </div>
    <div class="sb-company" id="sb-company-name">—</div>
    <div class="sb-nav">
      <div class="sb-section">الرئيسية</div>
      <a class="sb-item active" onclick="navigate('dashboard')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>لوحة التحكم</span>
      </a>
      <div class="sb-section">الإعدادات</div>
      <a class="sb-item" onclick="navigate('company')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>بيانات الشركة</span>
      </a>
      <a class="sb-item" onclick="navigate('users')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span>المستخدمون</span>
      </a>
      <div class="sb-section">المواد — قريباً</div>
      <a class="sb-item" style="opacity:.4;pointer-events:none">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
        <span>المواد الخام</span>
      </a>
      <a class="sb-item" style="opacity:.4;pointer-events:none">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
        <span>المنتجات</span>
      </a>
    </div>
    <div style="padding:12px 16px;border-top:1px solid #334155">
      <button class="btn btn-sm" style="width:100%;justify-content:center;background:#334155;color:#94a3b8;border:none" onclick="doLogout()">تسجيل الخروج</button>
    </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div class="topbar-left">
        <button class="btn btn-icon btn-outline" onclick="toggleSidebar()" style="display:none" id="menu-btn">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

<!-- MODALS -->
<div id="modal-container"></div>

<script>
// ============================================================
// DATABASE — IndexedDB (غير محدودة الحجم)
// ============================================================
const DB_NAME = 'pharma_erp';
const DB_VER  = 1;
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      // companies
      if (!d.objectStoreNames.contains('companies')) {
        const cs = d.createObjectStore('companies', { keyPath: 'id' });
        cs.createIndex('code', 'code', { unique: true });
      }
      // users
      if (!d.objectStoreNames.contains('users')) {
        const us = d.createObjectStore('users', { keyPath: 'id' });
        us.createIndex('company_username', ['companyId','username'], { unique: true });
        us.createIndex('companyId', 'companyId');
      }
      // sessions
      if (!d.objectStoreNames.contains('sessions')) {
        const ss = d.createObjectStore('sessions', { keyPath: 'id' });
      }
      // audit_log
      if (!d.objectStoreNames.contains('audit_log')) {
        const al = d.createObjectStore('audit_log', { keyPath: 'id', autoIncrement: true });
        al.createIndex('companyId', 'companyId');
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = e => rej(e.target.error);
  });
}

function txn(stores, mode='readonly') {
  return db.transaction(stores, mode);
}
function store(name, mode='readonly') {
  return txn(name, mode).objectStore(name);
}
function idbReq(req) {
  return new Promise((res, rej) => { req.onsuccess=e=>res(e.target.result); req.onerror=e=>rej(e.target.error); });
}
function getAll(storeName, indexName, key) {
  const s = store(storeName);
  const src = indexName ? s.index(indexName) : s;
  return idbReq(key !== undefined ? src.getAll(key) : src.getAll());
}
function getOne(storeName, key) { return idbReq(store(storeName).get(key)); }
function putOne(storeName, obj) { return idbReq(store(storeName,'readwrite').put(obj)); }
function deleteOne(storeName, key) { return idbReq(store(storeName,'readwrite').delete(key)); }

// ============================================================
// UTILS
// ============================================================
const uid  = () => crypto.randomUUID();
const now  = () => new Date().toISOString();
const hashPw = async pw => {
  const enc = new TextEncoder().encode(pw + 'pharma_salt_2024');
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
};
const verifyPw = async (pw, hash) => (await hashPw(pw)) === hash;
const fmt = d => d ? new Date(d).toLocaleDateString('ar-EG') : '—';
const fmtDt = d => d ? new Date(d).toLocaleString('ar-EG') : '—';
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let SESSION = null; // { companyId, userId, nameAr, companyNameAr, role }

async function auditLog(action, module, recordId, data) {
  if (!SESSION) return;
  await putOne('audit_log', { companyId: SESSION.companyId, userId: SESSION.userId, action, module, recordId: recordId||null, data: data||null, createdAt: now() });
}

// ============================================================
// AUTH
// ============================================================
async function doLogin() {
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  const username = document.getElementById('inp-user').value.trim();
  const password = document.getElementById('inp-pass').value;
  const alertEl = document.getElementById('login-alert');
  const btn = document.getElementById('login-btn-text');
  alertEl.innerHTML = '';
  if (!code || !username || !password) { showAlert(alertEl, 'danger', 'جميع الحقول مطلوبة'); return; }
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    // find company
    const companies = await getAll('companies');
    const company = companies.find(c => c.code === code && !c.deletedAt);
    if (!company) { showAlert(alertEl,'danger','كود الشركة غير صحيح'); btn.textContent='دخول'; return; }
    if (!company.isActive) { showAlert(alertEl,'danger','هذه الشركة موقوفة'); btn.textContent='دخول'; return; }
    // find user
    const users = await getAll('users','companyId', company.id);
    const user = users.find(u => u.username === username && !u.deletedAt);
    if (!user) { showAlert(alertEl,'danger','اسم المستخدم أو كلمة المرور غير صحيحة'); btn.textContent='دخول'; return; }
    if (!user.isActive) { showAlert(alertEl,'danger','هذا الحساب موقوف'); btn.textContent='دخول'; return; }
    // check locked
    if (user.lockedUntil && new Date(user.lockedUntil) > new Date()) {
      showAlert(alertEl,'danger','الحساب مقفل مؤقتاً، حاول بعد 30 دقيقة'); btn.textContent='دخول'; return;
    }
    // verify password
    const ok = await verifyPw(password, user.passwordHash);
    if (!ok) {
      const failed = (user.failedAttempts||0) + 1;
      user.failedAttempts = failed;
      if (failed >= 5) user.lockedUntil = new Date(Date.now() + 30*60*1000).toISOString();
      await putOne('users', user);
      showAlert(alertEl,'danger','كلمة المرور غير صحيحة' + (failed>=3 ? ` (${5-failed} محاولات متبقية)` : '')); btn.textContent='دخول'; return;
    }
    // reset failed + update last login
    user.failedAttempts = 0; user.lockedUntil = null; user.lastLogin = now();
    await putOne('users', user);
    // create session
    SESSION = { companyId: company.id, userId: user.id, nameAr: user.nameAr, companyNameAr: company.nameAr, role: user.role };
    sessionStorage.setItem('pharma_session', JSON.stringify(SESSION));
    await auditLog('LOGIN','auth', user.id);
    startApp();
  } catch(e) {
    console.error(e); showAlert(alertEl,'danger','خطأ غير متوقع: '+e.message);
  }
  btn.textContent = 'دخول';
}

async function doLogout() {
  await auditLog('LOGOUT','auth', SESSION?.userId);
  SESSION = null;
  sessionStorage.removeItem('pharma_session');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-pass').value = '';
}

function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sb-company-name').textContent = SESSION.companyNameAr;
  const av = SESSION.nameAr.charAt(0);
  document.getElementById('topbar-avatar').textContent = av;
  document.getElementById('topbar-username').textContent = SESSION.nameAr;
  navigate('dashboard');
}

const PAGE_TITLES = { dashboard:'لوحة التحكم', company:'بيانات الشركة', users:'المستخدمون' };
let currentPage = '';

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(el => { if(el.getAttribute('onclick')?.includes(`'${page}'`)) el.classList.add('active'); });
  document.getElementById('topbar-title').textContent = PAGE_TITLES[page] || page;
  const c = document.getElementById('content');
  if (page==='dashboard') renderDashboard(c);
  else if (page==='company') renderCompany(c);
  else if (page==='users') renderUsers(c);
  // mobile: close sidebar
  document.getElementById('sidebar').classList.remove('open');
}

  `, async () => {
    const nameAr = v('au-nameAr'), username = v('au-username'), password = v('au-password');
    if (!nameAr||!username||!password) { alert('الاسم واسم المستخدم وكلمة المرور مطلوبة'); return false; }
    if (password.length < 8) { alert('كلمة المرور يجب أن تكون 8 أحرف على الأقل'); return false; }
    // check unique
    const existing = await getAll('users','companyId', SESSION.companyId);
    if (existing.find(u=>u.username===username && !u.deletedAt)) { alert('اسم المستخدم موجود بالفعل'); return false; }
    const id = uid();
    const passwordHash = await hashPw(password);
    await putOne('users', { id, companyId: SESSION.companyId, nameAr, nameEn: v('au-nameEn'), username, passwordHash, role: v('au-role')||'user', department: v('au-department'), jobTitle: v('au-jobTitle'), email: v('au-email'), phone: v('au-phone'), isActive: true, failedAttempts: 0, createdBy: SESSION.userId, createdAt: now(), updatedAt: now() });

    toast('تم إضافة المستخدم بنجاح');
    renderUsers(document.getElementById('content'));
  });
}

    </div>
    <div class="form-group"><label class="form-label">كلمة مرور جديدة (اتركها فارغة إذا لم تريد التغيير)</label><input class="form-control" type="password" id="eu-password" placeholder="اتركها فارغة للإبقاء على الحالية"></div>
  `, async () => {
    const nameAr = v('eu-nameAr');
    if (!nameAr) { alert('الاسم مطلوب'); return false; }
    u.nameAr = nameAr; u.nameEn = v('eu-nameEn'); u.role = v('eu-role');
    u.department = v('eu-department'); u.jobTitle = v('eu-jobTitle'); u.email = v('eu-email');

    toast('تم تحديث بيانات المستخدم');

  });

async function toggleUser(id) {
  const u = await getOne('users', id);
  if (!u) return;
  u.isActive = !u.isActive; u.updatedAt = now();
  await putOne('users', u);
  await auditLog(u.isActive?'ACTIVATE':'DEACTIVATE','users', id);
  toast(u.isActive ? 'تم تفعيل المستخدم' : 'تم إيقاف المستخدم');
  renderUsers(document.getElementById('content'));
}

function v(id) { const el = document.getElementById(id); return el ? (el.value||'').trim() : ''; }

function switchTab(btn, tabId) {
  const modal = btn.closest('.modal-body') || btn.closest('#modal-container');
  modal.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

      <div class="modal-header">
        <span class="modal-title">${esc(title)}</span>
        <button class="btn btn-icon btn-outline" onclick="closeModal()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">${body}</div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-primary" id="modal-save-btn" onclick="handleSave()">حفظ</button>
      </div>
    </div>
  </div>`;
  mc._onSave = onSave;
}

async function handleSave() {
  const btn = document.getElementById('modal-save-btn');
  const mc  = document.getElementById('modal-container');
  if (!mc._onSave) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> جاري الحفظ...';
  try {
    const result = await mc._onSave();
    if (result !== false) closeModal();
  } catch(e) {
    alert('خطأ: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = 'حفظ';
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

let toastTimer;
function toast(msg, type='success') {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:opacity .3s;max-width:320px;text-align:center'; document.body.appendChild(t); }
  if (type==='error') t.style.background='var(--danger)';
  else t.style.background='#1e293b';
  t.textContent = msg; t.style.opacity='1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.style.opacity='0'; }, 3000);
}

function showAlert(el, type, msg) {
  el.innerHTML = `<div class="alert alert-${type==='danger'?'danger':'success'}">${esc(msg)}</div>`;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ============================================================
// RESPONSIVE
// ============================================================
function handleResize() {
  const mobile = window.innerWidth < 768;
  document.getElementById('menu-btn').style.display = mobile ? 'flex' : 'none';
}
window.addEventListener('resize', handleResize);
handleResize();

// ============================================================
// INIT
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('login-screen').style.display!=='none') doLogin();
  if (e.key==='Escape') closeModal();
});

(async () => {
  await openDB();
  // restore session
  const saved = sessionStorage.getItem('pharma_session');
  if (saved) {
    try {
      SESSION = JSON.parse(saved);
      // verify company still exists
      const c = await getOne('companies', SESSION.companyId);
      if (c) { startApp(); return; }
    } catch {}
    sessionStorage.removeItem('pharma_session');
  }
  document.getElementById('login-screen').style.display = 'flex';
})();
</script>
</body>
</html>
